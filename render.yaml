services:
  - type: web
    name: emerald-voice-agent
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 8080
      - key: WEBHOOK_SECRET
        sync: false
      - key: BLAND_API_KEY
        sync: false
      - key: BLAND_INBOUND_NUMBER
        sync: false
      - key: ST_CLIENT_ID
        sync: false
      - key: ST_CLIENT_SECRET
        sync: false
      - key: ST_APP_KEY
        sync: false
      - key: ST_TENANT_ID
        value: 909240878
      - key: ST_BOOKING_PROVIDER_ID
        sync: false
      - key: ST_AUTH_URL
        value: https://auth.servicetitan.io/connect/token
      - key: ST_API_BASE
        value: https://api.servicetitan.io
